name: Skill Health

on:
  schedule:
    - cron: "0 3 1 * *"   # monthly, 1st of month at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  health:
    uses: sorunokoe/skills-evolution/.github/workflows/oss-skill-health.yml@main
    with:
      enable_ai_skill_update: true
      tracked_deps: '[{"alias": "compose-multiplatform", "repo": "JetBrains/compose-multiplatform"}]'
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
